# Configuración del Bot de Minecraft

# Servidor
server:
  host: "localhost"
  port: 25565
  name: "Mi Servidor"

# Credenciales del bot
bot:
  username: "MineBot"
  password: ""  # Dejar vacío si es servidor offline
  offline_mode: true

# Comportamiento del bot
behavior:
  auto_reconnect: true
  reconnect_delay: 5  # segundos
  action_delay: 1.0  # segundos entre acciones
  max_session_time: 0  # 0 = sin límite

# Movimiento
movement:
  enabled: true
  min_x: -100
  max_x: 100
  min_z: -100
  max_z: 100

# Recolección de bloques
collection:
  enabled: true
  target_blocks:
    - "oak_log"
    - "stone"
    - "dirt"
    - "sand"
    - "gravel"
  max_items_per_block: 64

# Construcción
building:
  enabled: true
  build_blocks:
    - "oak_wood"
    - "stone"
    - "bricks"
  structures:
    - "wall"
    - "tower"
    - "house"

# Logging
logging:
  level: "INFO"
  file: "bot.log"
